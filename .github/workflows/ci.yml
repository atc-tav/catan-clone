name: CI

# Runs on every pull request and on pushes to main, so a red ❌ shows up before
# you merge (and before Vercel attempts a deploy).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel an in-progress run if newer commits are pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (core purity + app)
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
